<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReplyMate Settings</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --text: #222222;
      --muted: #5f6368;
      --border: #d0d7de;
      --select-bg: #ffffff;
      --select-text: #222222;
      --button-bg: #7943f1;
      --button-text: #ffffff;
      --success: #188038;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202124;
        --text: #e8eaed;
        --muted: #9aa0a6;
        --border: #5f6368;
        --select-bg: #303134;
        --select-text: #e8eaed;
        --button-bg: #7943f1; /* 유지 */
        --button-text: #ffffff; /* 유지 */
        --success: #188038; /* 유지 */
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 260px;
      padding: 14px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
      line-height: 1.2;
      color: var(--text);
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    select {
      width: 100%;
      padding: 9px 10px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--select-bg);
      color: var(--select-text);
      outline: none;
    }

    input[type="text"] {
      width: 100%;
      padding: 9px 10px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--select-bg);
      color: var(--select-text);
      outline: none;
    }

/* FIX: dropdown option text visibility */
option {
  color: #000;
  background: #fff;
}

@media (prefers-color-scheme: dark) {
  option {
    color: #fff;
    background: #303134;
  }
}

    select:focus {
      border-color: var(--button-bg);
    }

    button {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: var(--button-bg);
      color: var(--button-text);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #b794f6;
      color: #222222;
    }

    button:disabled {
      opacity: 0.7;
      cursor: default;
    }

    #statusMessage {
      display: none; /* Hidden since we'll use button feedback instead */
    }

    .plan-usage {
      margin: 12px 0 8px 0;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .upgrade-box {
      margin: 8px 0 0 0;
      padding: 12px;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      background: #EFE8FF;
      text-align: center;
    }

    .upgrade-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .upgrade-link {
      font-size: 13px;
      color: var(--button-bg);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .upgrade-link:hover {
      text-decoration: underline;
    }

    .upgrade-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .upgrade-pro {
      padding: 8px 12px;
      border: 1px solid #ffffff;
      border-radius: 6px;
      background: #ffffff;
      color: #000000 ;
      display: block;
      text-align: center;
      transition: all 0.2s ease;
    }

    .upgrade-pro:hover {
      background: #D3D3D3  ;
      text-decoration: none;
      border-color: #D3D3D3  ;
    }

    .upgrade-pro-plus {
      padding: 8px 12px;
      border: 1px solid #FFFF99;
      border-radius: 6px;
      background: linear-gradient(135deg, #FFD700 0%, #FFD700 50%, #FFFF99 100%);
      color: #2C1810;
      display: block;
      text-align: center;
      font-weight: 600;
      box-shadow: 0 2px 4px rgba(212, 175, 55, 0.3);
      transition: all 0.2s ease;
    }

    .upgrade-pro-plus:hover {
      background: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #8B6914 100%);
      text-decoration: none;
      box-shadow: 0 4px 8px rgba(212, 175, 55, 0.4);
      transform: translateY(-1px);
    }

    @media (prefers-color-scheme: dark) {
      .upgrade-pro:hover {
        background: #D3D3D3;
        border-color: #D3D3D3;
      }

      .upgrade-pro-plus {
        background: linear-gradient(135deg, #FFD700 0%, #FFD700 50%, #FFFF99 100%);
        color: #2C1810;
      }

      .upgrade-pro-plus:hover {
        background: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #8B6914 100%);
        text-decoration: none;
        box-shadow: 0 4px 8px rgba(212, 175, 55, 0.4);
        transform: translateY(-1px);
      }
      
      .upgrade-box {
        border-color: #808080 ;
        background: #808080 ;
      }
      
      .upgrade-title {
        color: #ffffff !important; /* 흰색으로 변경 */
      }
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 18px;
      line-height: 1.2;
      color: var(--text);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="header-icon" src="../icons/icon32.png" alt="ReplyMate Icon">
    <h2 class="header-title">ReplyMate Settings</h2>
  </div>

  <div class="field">
    <label for="toneSelect">Reply Tone</label>
    <select id="toneSelect">
      <option value="professional">Professional</option>
      <option value="polite">Polite</option>
      <option value="friendly">Friendly</option>
      <option value="direct">Direct</option>
    </select>
  </div>

  <div class="field">
    <label for="lengthSelect">Reply Length</label>
    <select id="lengthSelect">
      <option value="short">Short</option>
      <option value="medium">Medium</option>
      <option value="long">Long</option>
    </select>
  </div>

  <div class="field">
    <label for="userNameInput">Your Name</label>
    <input
      id="userNameInput"
      type="text"
      placeholder="Enter your name"
      autocomplete="off"
    />
  </div>

  <div class="field">
    <label for="languageSelect">Language</label>
    <select id="languageSelect">
      <option value="english">English</option>
      <option value="korean">Korean</option>
      <option value="japanese">Japanese</option>
    </select>
  </div>

  <button id="saveButton" type="button">Save</button>
  <div id="statusMessage">Saved!</div>
  
  <div class="plan-usage">
    Loading...
  </div>
  
  <div class="upgrade-box">
    <div class="upgrade-title">Unlock more replies with Pro</div>
    <div class="upgrade-buttons">
      <a id="upgradeProLink" href="#" class="upgrade-link upgrade-pro">Upgrade to Pro</a>
      <a id="upgradeProPlusLink" href="#" class="upgrade-link upgrade-pro-plus">Upgrade to Pro+</a>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
